<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      width: 320px;
      margin: 0;
      padding: 18px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #0F172A;
      background: #fff;
    }
    h1 {
      font-size: 16px;
      font-weight: 800;
      margin: 0 0 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .badge {
      background: linear-gradient(135deg, #0EA5E9, #0284C7);
      color: #fff;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
    }
    .hint {
      font-size: 11.5px;
      color: #64748B;
      margin-bottom: 14px;
      line-height: 1.45;
    }
    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #475569;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 9px 11px;
      border-radius: 8px;
      border: 1px solid #E2E8F0;
      background: #F8FAFC;
      font-size: 12.5px;
      font-family: ui-monospace, "SF Mono", Consolas, monospace;
      outline: none;
      color: #0F172A;
    }
    input:focus {
      border-color: #0EA5E9;
      background: #fff;
    }
    .field { margin-bottom: 12px; }
    button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: #0F172A;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
    }
    button:hover { background: #1E293B; }
    .saved {
      background: #059669 !important;
    }
    .status {
      font-size: 11.5px;
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      display: none;
    }
    .status.ok {
      background: #ECFDF5;
      color: #059669;
      display: block;
    }
    .status.err {
      background: #FEF2F2;
      color: #DC2626;
      display: block;
    }
    .divider {
      height: 1px;
      background: #E2E8F0;
      margin: 14px 0;
    }
    code {
      background: #F1F5F9;
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <h1>RealTrack <span class="badge">Capture</span></h1>
  <p class="hint">Configure once. The floating button on the Readymode dialer will send the current lead + recording to RealTrack.</p>

  <div class="field">
    <label for="apiKey">API Key</label>
    <input type="text" id="apiKey" placeholder="rt_live_..." spellcheck="false" />
  </div>

  <div class="field">
    <label for="webhookUrl">Webhook URL (optional)</label>
    <input type="text" id="webhookUrl" placeholder="https://quality-coach-ai.pages.dev/api/inbound/lead" spellcheck="false" />
  </div>

  <button id="saveBtn">Save</button>
  <div id="status" class="status"></div>

  <div class="divider"></div>
  <p class="hint">
    Get your API key at <code>/dashboard/settings/api</code> in RealTrack.
    Webhook URL defaults to the production endpoint — leave blank to use it.
  </p>

  <script src="popup.js"></script>
</body>
</html>
